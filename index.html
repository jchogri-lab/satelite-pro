<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NASA: Simulador de Satélite Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="telemetry-panel" class="panel">
            <h3>SISTEMA DE TELEMETRÍA</h3>
            <div class="stat">Altitud: <span id="val-alt">--</span></div>
            <div class="stat">Velocidad: <span id="val-vel">--</span></div>
            <div class="stat">Periodo: <span id="val-per">--</span></div>
            <div class="stat">Latitud: <span id="val-lat">--</span></div>
            <div class="stat">Inclinación: <span id="val-inc">--</span></div>
            <div class="stat">Tiempo de Órbita: <span id="val-time">--</span></div>
            <div class="progress-container">
                <div id="orbit-progress"></div>
            </div>
            <div style="font-size:10px; margin-top:5px;">Progreso: <span id="orbit-deg">0</span>°</div>
        </div>

        <div id="camera-controls" class="panel">
            <button class="btn" data-preset="overview" onclick="setCameraPreset('overview')">Vista Global</button>
            <button class="btn" data-preset="earth" onclick="setCameraPreset('earth')">Tierra</button>
            <button class="btn" data-preset="satellite" onclick="setCameraPreset('satellite')">Satélite</button>
        </div>
    </div>

    <div id="lbl-sat" class="label">SATELLITE</div>
    <div id="lbl-earth" class="label">TIERRA</div>
    <div id="lbl-tropo" class="label">TROPOSFERA</div>
    <div id="lbl-strato" class="label">ESTRATOSFERA</div>
    <div id="lbl-leo" class="label">ÓRBITA LEO</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module" src="main.js"></script>
    <div id="inspector-panel" class="panel" style="display:none; bottom: 80px; left: 20px;">
    <h3 id="part-name">Nombre de la pieza</h3>
    <p id="part-desc">Haz clic en una parte para ver su función.</p>
    <button onclick="document.getElementById('inspector-panel').style.display='none'">Cerrar</button>
</div>

<div id="controls-bottom" class="panel">
    <button onclick="togglePause()">⏯️ Pausa / Play</button>
    <button onclick="setCameraPreset('satellite')">🛰️ Inspeccionar Satélite</button>
</div>
</body>
</html>
