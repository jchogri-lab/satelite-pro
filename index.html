<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Espacial Educativo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: #00f2ff;
        }
        .panel {
            position: absolute; background: rgba(0, 15, 30, 0.85);
            padding: 15px; border: 1px solid #005eb8; border-radius: 8px;
            pointer-events: auto;
        }
        #telemetry { top: 20px; left: 20px; width: 220px; }
        #info-box { bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; }
        .label {
            position: absolute; background: rgba(0,0,0,0.7); color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 12px;
            border: 1px solid #00f2ff; transform: translate(-50%, -50%);
        }
        button {
            background: #005eb8; color: white; border: none; padding: 8px 15px;
            cursor: pointer; border-radius: 4px; margin: 5px;
        }
        button:hover { background: #00f2ff; color: #000; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="telemetry" class="panel">
            <h3 style="margin:0 0 10px 0;">TELEMETRÍA NASA</h3>
            <div>Altitud: <span id="val-alt">408 km</span></div>
            <div>Velocidad: <span id="val-vel">7.66 km/s</span></div>
            <div style="margin-top:10px; background:#333; height:4px;">
                <div id="orbit-bar" style="width:0%; background:#00f2ff; height:100%;"></div>
            </div>
        </div>

        <div id="info-box" class="panel">
            <h4 id="edu-title">Sistema de Aprendizaje</h4>
            <p id="edu-text" style="font-size:14px;">Haz clic en los botones para explorar conceptos espaciales.</p>
            <button onclick="updateEdu('solar')">Paneles</button>
            <button onclick="updateEdu('gravity')">Gravedad</button>
            <button onclick="updateEdu('atmo')">Atmósfera</button>
        </div>

        <div id="lbl-sat" class="label">SATÉLITE</div>
        <div id="lbl-earth" class="label">TIERRA</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module" src="main.js"></script>
    <script>
        function updateEdu(type) {
            const t = document.getElementById('edu-title');
            const d = document.getElementById('edu-text');
            const data = {
                solar: ["Energía Solar", "Los paneles azules convierten la luz del Sol en electricidad para que el satélite funcione."],
                gravity: ["Caída Libre", "El satélite no se cae porque se mueve tan rápido que 'falla' el suelo mientras cae."],
                atmo: ["La Protección", "Ese resplandor azul es la atmósfera. Protege la vida y frena a los objetos que entran."]
            };
            t.innerText = data[type][0];
            d.innerText = data[type][1];
        }
    </script>
</body>
</html>
