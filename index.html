<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Kids: Simulador de Satélites</title>
    <style>
        :root { --glow: #00f2ff; --dark-space: #000a1a; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(0, 242, 255, 0.05); box-sizing: border-box;
        }

        .glass-panel {
            position: absolute; background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(5px); border: 1px solid var(--glow);
            padding: 20px; border-radius: 15px; color: var(--glow); pointer-events: auto;
        }

        #telemetry { top: 30px; left: 30px; width: 250px; }
        #mission-control { bottom: 30px; right: 30px; width: 320px; }
        
        .label {
            position: absolute; color: white; background: rgba(0, 242, 255, 0.2);
            padding: 5px 12px; border-radius: 20px; font-size: 11px;
            border: 1px solid var(--glow); transform: translate(-50%, -50%);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-nasa {
            background: transparent; color: var(--glow); border: 1px solid var(--glow);
            padding: 8px 12px; margin: 5px; cursor: pointer; transition: 0.3s; width: 100%;
            text-align: left; border-radius: 5px;
        }
        .btn-nasa:hover { background: var(--glow); color: black; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="telemetry" class="glass-panel">
            <h3 style="margin:0">STAT-LOG: LEO</h3>
            <hr border="0" style="border-top:1px solid var(--glow); margin:10px 0;">
            <div>Altitud: <span id="val-alt">408 km</span></div>
            <div>Velocidad: <span id="val-vel">27,600 km/h</span></div>
            <div>Inclinación: <span>51.6° (ISS)</span></div>
            <div style="margin-top:15px; font-size:12px; color:white;">Status: <span style="color:#0f0">SISTEMAS NOMINALES</span></div>
        </div>

        <div id="mission-control" class="glass-panel">
            <h4 style="margin:0">MÓDULO DE APRENDIZAJE</h4>
            <p id="edu-text" style="font-size:13px; color:white; min-height:60px;">Selecciona un componente para analizar.</p>
            <button class="btn-nasa" onclick="showInfo('foil')">🛡️ Manta Térmica (Foil)</button>
            <button class="btn-nasa" onclick="showInfo('orbit')">🛰️ ¿Por qué no flota?</button>
            <button class="btn-nasa" onclick="showInfo('atmo')">🌀 Capas Atmosféricas</button>
        </div>

        <div id="lbl-sat" class="label">SATELLITE UNIT-1</div>
        <div id="lbl-earth" class="label">PLANETA TIERRA</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module" src="main.js"></script>
    <script>
        function showInfo(topic) {
            const el = document.getElementById('edu-text');
            const info = {
                foil: "Ese brillo dorado es una manta térmica (MLI). Protege al satélite de temperaturas extremas: de -150°C en la sombra a 150°C al sol.",
                orbit: "No está flotando, está CAYENDO. Pero se mueve tan rápido hacia adelante que la curvatura de la Tierra se aleja mientras él cae.",
                atmo: "La línea azul que ves es la atmósfera. Solo mide 100km de espesor. El satélite está justo por encima para evitar el roce del aire."
            };
            el.innerText = info[topic];
        }
    </script>
</body>
</html>
