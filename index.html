<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Espacial Didáctico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="telemetry" class="panel">
            <h3>DATOS DE MISIÓN</h3>
            <div>Altitud: <span id="val-alt">408 km</span></div>
            <div>Velocidad: <span id="val-vel">27,600 km/h</span></div>
            <div class="progress-bg"><div id="orbit-bar"></div></div>
        </div>

        <div id="mission-control" class="panel">
            <h4 id="edu-title">Módulo de Aprendizaje</h4>
            <p id="edu-text">Haz clic en un botón para explorar la física orbital.</p>
            <button onclick="updateEdu('solar')">☀️ Energía Solar</button>
            <button onclick="updateEdu('gravity')">🌍 Gravedad</button>
            <button onclick="updateEdu('atmo')">🌀 Atmósfera</button>
        </div>

        <div id="lbl-sat" class="label">SATELLITE</div>
        <div id="lbl-earth" class="label">TIERRA</div>
    </div>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module" src="main.js"></script>
    <script>
        function updateEdu(type) {
            const data = {
                solar: ["Energía Solar", "Los paneles azules convierten la luz del Sol en electricidad."],
                gravity: ["Caída Libre", "El satélite 'cae' constantemente alrededor de la Tierra debido a su velocidad."],
                atmo: ["Atmósfera", "El halo azul es la atmósfera, que protege la vida y frena objetos."]
            };
            document.getElementById('edu-title').innerText = data[type][0];
            document.getElementById('edu-text').innerText = data[type][1];
        }
    </script>
</body>
</html>
